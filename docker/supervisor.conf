[supervisord]
nodaemon=true

[program:tracker-server]
command=/opt/tracker-server/build/tracker-server /opt/tracker-server/config/tracker.conf
autostart=true
autorestart=true
stderr_logfile=/var/log/tracker-server.err.log
stdout_logfile=/var/log/tracker-server.out.log
environment=PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

[program:api-server]
command=node /opt/tracker-server/dashboard/server.js
autostart=true
autorestart=true
stderr_logfile=/var/log/api-server.err.log
stdout_logfile=/var/log/api-server.out.log
environment=PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin,NODE_ENV=production
directory=/opt/tracker-server/dashboard