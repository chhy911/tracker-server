version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: tracker-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-tracker_db}
      MYSQL_USER: ${MYSQL_USER:-tracker}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-tracker_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - tracker-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5

  tracker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: tracker-server
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      TRACKER_DB_HOST: mysql
      TRACKER_DB_PORT: 3306
      TRACKER_DB_USER: ${MYSQL_USER:-tracker}
      TRACKER_DB_PASSWORD: ${MYSQL_PASSWORD:-tracker_password}
      TRACKER_DB_NAME: ${MYSQL_DATABASE:-tracker_db}
    ports:
      - "6969:6969"
      - "8081:8081"
    volumes:
      - ../logs:/opt/tracker-server/logs
    networks:
      - tracker-network
    restart: unless-stopped

  web:
    image: nginx:alpine
    container_name: tracker-web
    depends_on:
      - tracker
    ports:
      - "8888:8888"
    volumes:
      - ../dashboard/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - tracker-network
    restart: unless-stopped

networks:
  tracker-network:
    driver: bridge

volumes:
  mysql_data:
