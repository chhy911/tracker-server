# BitTorrent Tracker Server Configuration

[server]
# Server listening address
host=0.0.0.0

# Server listening port
port=6969

# Number of worker threads (1.6GB VPS 建议 4)
worker_threads=4

# Maximum concurrent connections
max_connections=200

# Timeout for peer connections (seconds)
connection_timeout=300

[database]
# MySQL server host
host=localhost

# MySQL server port
port=3306

# MySQL username
user=tracker

# MySQL password
password=tracker_password

# Database name
database=tracker_db

# Connection pool size
pool_size=20

# Connection timeout (seconds)
timeout=30

[api]
# REST API listening port (8080 若被 qBittorrent 等占用请改为 8081)
port=8081

# REST API listening host
host=0.0.0.0

[dashboard]
# 生产由 Nginx 8888 托管静态文件，内置 3000 默认关闭
enabled=false

# Dashboard static file server port (enabled=true 时)
port=3000

# Dashboard listening host
host=0.0.0.0

# Path to built frontend (npm run build)
static_path=dashboard/dist

[logging]
# Log level: debug, info, warn, error, critical
level=info

# Log file path
file=logs/tracker.log

# Maximum log file size (in MB)
max_size=100

# Number of backup log files to keep
backup_count=5

[tracker]
# Announce interval (seconds)
announce_interval=1800

# Minimum announce interval (seconds)
min_announce_interval=600

# Number of peers to return per announce
num_want=50

# Cleanup old peers interval (seconds)
cleanup_interval=3600

# Maximum peer age (seconds) - peers older than this will be removed
max_peer_age=3600

[performance]
# Enable connection pooling
use_connection_pool=true

# Request timeout (milliseconds)
request_timeout=5000

# Buffer size for network I/O (bytes)
buffer_size=8192